services:
  e2e-postgres:
    image: postgres:16
    container_name: cruxpass_e2e_db
    environment:
      POSTGRES_DB: cruxpass_e2e
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres", "-d", "cruxpass_e2e"]
      interval: 5s
      timeout: 5s
      retries: 10
